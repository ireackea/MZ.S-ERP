name: FeedFactory CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    # 1. Checkout the code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # 3. Install Dependencies
    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    # 4. Linting (Check code quality)
    - name: Lint code
      continue-on-error: true 
      run: npm run lint || echo "Linting skipped or not configured"
      
    # 5. Type Checking (TypeScript)
    - name: TypeScript Check
      run: npx tsc --noEmit

    # 6. Run Tests
    - name: Run Tests
      run: npx vitest run

    # 7. Build the Application
    - name: Build Project
      run: npm run build:full

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up Docker Buildx for multi-platform builds
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Login to GitHub Container Registry
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Build and push backend image
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Build and push frontend image
    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
        build-args: VITE_API_URL=/api
        cache-from: type=gha
        cache-to: type=gha,mode=max

  docker-security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: docker-build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Docker Scout on backend
      uses: docker/scout-action@v1
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
        command: cves
        continue-on-error: true

    - name: Run Docker Scout on frontend
      uses: docker/scout-action@v1
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
        command: cves
        continue-on-error: true

  docker-compose-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build images for testing
      run: |
        docker compose build

    - name: Start services with Docker Compose
      run: |
        docker compose up -d
        sleep 10

    - name: Health check
      run: |
        docker compose ps
        docker compose logs

    - name: Cleanup
      if: always()
      run: docker compose down
