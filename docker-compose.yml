# ENTERPRISE FIX: Phase 0 – Critical Security & Encoding Lockdown - 2026-03-13
# ENTERPRISE FIX: Phase 1 – PostgreSQL Pivot + Zustand Single Source of Truth - 2026-03-13
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: feed_factory_db
      POSTGRES_USER: feedfactory
      POSTGRES_PASSWORD: SecurePassword2026!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://feedfactory:SecurePassword2026!@postgres:5432/feed_factory_db
      JWT_SECRET: phase-0-production-secret-2026
      RESET_TOKEN: CONFIRM_SYSTEM_RESET_2026
      BACKUP_ENCRYPTION_SECRET: phase-0-backup-secret-2026
      ALLOWED_ORIGINS: http://localhost:4173,http://127.0.0.1:4173
      CORS_ORIGINS: http://localhost:4173,http://127.0.0.1:4173
      PORT: 3001
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  postgres_data: